<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phasmophobia Cheatsheet - by Mr. Robot</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- PREMIUM MODERN PALETTE --- */
        :root[data-theme="dark"] {
            --bg-base: #09090b; --bg-panel: #18181b; --bg-card: #27272a; 
            --text-main: #f4f4f5; --text-muted: #a1a1aa; --text-accent: #8b5cf6; 
            --border: rgba(255,255,255,0.08); --btn-neutral: rgba(255,255,255,0.05); --btn-hover: rgba(255,255,255,0.1);
            --ev-found: #10b981; --ev-found-border: #059669;
            --ev-ruled: #ef4444; --ev-ruled-border: #dc2626;
            --beh-found: #0ea5e9; --beh-found-border: #0284c7;
            --spd-found: #f59e0b; --spd-found-border: #d97706;
            --discord-color: #5865F2;
        }
        
        :root[data-theme="light"] {
            --bg-base: #f4f4f5; --bg-panel: #ffffff; --bg-card: #ffffff; 
            --text-main: #18181b; --text-muted: #71717a; --text-accent: #7c3aed; 
            --border: rgba(0,0,0,0.1); --btn-neutral: #f4f4f5; --btn-hover: #e4e4e7;
            --ev-found: #10b981; --ev-found-border: #059669;
            --ev-ruled: #ef4444; --ev-ruled-border: #dc2626;
            --beh-found: #0ea5e9; --beh-found-border: #0284c7;
            --spd-found: #f59e0b; --spd-found-border: #d97706;
            --discord-color: #5865F2;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-base); color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; 
            transition: background-color 0.3s ease, opacity 0.2s ease; 
        }

        /* ELECTRON DRAG ZONES */
        .drag-region { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag; }
        
        /* --- SIDEBAR --- */
        .sidebar { 
            width: 310px; min-width: 280px; max-width: 450px; 
            background-color: var(--bg-panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; 
            z-index: 10; box-shadow: 4px 0 24px rgba(0,0,0,0.2);
            overflow-x: hidden; overflow-y: auto; 
        }
        
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

        .sidebar-header { 
            padding: 15px; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; background: var(--bg-panel); z-index: 10; 
            display: flex; flex-direction: column; gap: 12px; cursor: move;
        }
        
        .brand-container h1 { margin: 0; color: var(--text-accent); font-size: 1.15rem; text-transform: uppercase; font-weight: 800;}
        .creator-tag { margin: 2px 0 0 0; font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        
        .top-controls { display: flex; justify-content: space-between; gap: 6px; }
        .control-btn { 
            flex: 1; background: var(--btn-neutral); border: 1px solid var(--border); color: var(--text-main); 
            padding: 6px 4px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; 
            transition: 0.2s; text-align: center;
        }
        .control-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
        .close-btn:hover { background: var(--ev-ruled); color: white; border-color: var(--ev-ruled-border); }

        .sidebar-content { padding: 15px; }

        /* SETTINGS PANEL */
        .settings-panel { display: flex; flex-direction: column; gap: 10px; background: var(--bg-card); padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px;}
        .setting-row { display: flex; justify-content: space-between; align-items: center; }
        .setting-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .setting-select { background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); padding: 4px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; outline: none; cursor: pointer; max-width: 100px;}
        .toggle-btn { background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; width: 65px; text-align: center;}
        .toggle-btn.active { background: #880000; color: white; border-color: #ff4444; }
        
        input[type="range"] { accent-color: var(--text-accent); width: 80px; cursor: pointer;}

        /* SIDEBAR TOOLS (MOVED FROM TOP BAR) */
        .tool-card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .tool-header { display: flex; justify-content: space-between; align-items: center; }
        .tool-title { font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin: 0; }
        .tool-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        
        .tool-btn { background: var(--btn-neutral); color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.75rem; transition: 0.15s ease; flex: 1;}
        .tool-btn:hover { background: var(--btn-hover); transform: scale(1.02); }
        .tap-btn { background: var(--spd-found); color: white; border-color: var(--spd-found-border); }
        .tap-btn:hover { filter: brightness(1.15); }
        .timer-btn-start { background: var(--ev-ruled); color: white; border-color: var(--ev-ruled-border); }
        
        .timer-display { font-size: 1.4rem; font-family: monospace; font-weight: 800; text-align: center; width: 100%;}
        .timer-milestones { display: flex; gap: 4px; width: 100%; justify-content: center;}
        .milestone { padding: 2px 6px; border-radius: 4px; background: rgba(128,128,128,0.1); border: 1px solid var(--border); font-size: 0.65rem; font-weight: 800; color: var(--text-muted); }
        .milestone.active { background: var(--ev-found); color: white; border-color: var(--ev-found-border); box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        .speed-display { font-size: 1.4rem; font-family: monospace; font-weight: 800; color: var(--spd-found); text-align: center; margin: 0; line-height: 1;}
        .speed-history { display: flex; gap: 4px; justify-content: center; min-height: 18px; margin-top: 4px; }
        .hist-pill { background: rgba(128,128,128,0.15); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; color: var(--text-muted); font-family: monospace; font-weight: 800;}

        .metro-select { width: 100%; max-width: none; background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); padding: 6px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; outline: none; }
        .metro-btn.playing { background: var(--btn-neutral); color: var(--text-main); border-color: var(--border); }
        .metro-btn.flash { background: #10b981 !important; color: white !important; box-shadow: 0 0 12px rgba(16, 185, 129, 0.8); border-color: #059669 !important; }

        @keyframes timerWarningFlash { 0% { background-color: var(--ev-ruled); color: white; } 100% { background-color: transparent; color: var(--text-main); } }
        .timer-warning-flash { animation: timerWarningFlash 0.8s; }

        /* FILTER BUTTONS */
        .filter-group { margin-bottom: 20px; }
        .filter-group h3 { margin: 0 0 10px 0; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 4px; font-weight: 800;}
        .btn-list { display: flex; flex-direction: column; gap: 5px; }
        .filter-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--btn-neutral); color: var(--text-main); border: 1px solid transparent; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.15s ease; }
        .filter-btn:hover { background: var(--btn-hover); border-color: var(--border); }
        
        .filter-btn.ev-btn[data-state="1"] { background: var(--ev-found); border-color: var(--ev-found-border); color: white; }
        .filter-btn.ev-btn[data-state="2"], .filter-btn.spd-btn[data-state="2"] { background: var(--ev-ruled); border-color: var(--ev-ruled-border); color: white; opacity: 0.7; text-decoration: line-through; }
        .filter-btn.spd-btn[data-state="1"] { background: var(--spd-found); border-color: var(--spd-found-border); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--bg-base); }
        
        .main-header { 
            padding: 12px 25px; border-bottom: 1px solid var(--border); background-color: var(--bg-panel); 
            display: flex; justify-content: space-between; align-items: center; z-index: 5; cursor: move;
        }
        .ghost-counter { font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin: 0; }
        .ghost-counter span { color: var(--text-accent); }
        
        .toggle-hide-btn { background: rgba(128,128,128,0.1); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.2s;}
        .toggle-hide-btn:hover { background: var(--btn-hover); }
        .toggle-hide-btn.active { background: var(--text-accent); color: white; border-color: #7c3aed; }

        /* GHOST GRID */
        .ghost-scroll { flex: 1; overflow-y: auto; padding: 25px; }
        .ghost-scroll::-webkit-scrollbar { width: 8px; }
        .ghost-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
        .ghost-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-width: 1600px; margin: 0 auto; align-items: stretch;}
        
        .ghost-card { background: linear-gradient(145deg, var(--bg-card) 0%, rgba(39, 39, 42, 0.3) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; position: relative; overflow: hidden;}
        .ghost-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, transparent); transition: 0.3s;}
        .ghost-card:hover { transform: translateY(-3px); border-color: var(--text-muted); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .ghost-card:hover::before { background: linear-gradient(90deg, var(--text-accent), var(--spd-found)); }
        
        .ghost-card.speed-highlight { border-color: var(--spd-found-border); box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); }
        .ghost-card.crossed-out { opacity: 0.25; filter: grayscale(100%); transform: none; box-shadow: none; border-color: transparent; }
        .ghost-card.crossed-out .card-title { text-decoration: line-through; color: var(--text-muted); }
        .ghost-card.crossed-out::before { display: none; }
        body.hide-crossed-mode .ghost-card.crossed-out { display: none !important; }

        .card-front { display: flex; flex-direction: column; gap: 8px; height: 100%;}
        .card-back { display: none; flex-direction: column; gap: 8px; height: 100%; }
        .ghost-card.show-guide .card-front { display: none; }
        .ghost-card.show-guide .card-back { display: flex; }

        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .card-title { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px;}
        .flip-btn { background: var(--btn-neutral); color: var(--text-main); border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.2s;}
        .flip-btn:hover { background: var(--text
