<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phasmophobia Cheatsheet - by Mr. Robot</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- PREMIUM MODERN PALETTE --- */
        :root[data-theme="dark"] {
            --bg-base: #09090b; --bg-panel: #18181b; --bg-card: #27272a; 
            --text-main: #f4f4f5; --text-muted: #a1a1aa; --text-accent: #8b5cf6; 
            --border: rgba(255,255,255,0.08); --btn-neutral: rgba(255,255,255,0.05); --btn-hover: rgba(255,255,255,0.1);
            --ev-found: #10b981; --ev-found-border: #059669;
            --ev-ruled: #ef4444; --ev-ruled-border: #dc2626;
            --beh-found: #0ea5e9; --beh-found-border: #0284c7;
            --spd-found: #f59e0b; --spd-found-border: #d97706;
            --discord-color: #5865F2;
        }
        
        :root[data-theme="light"] {
            --bg-base: #f4f4f5; --bg-panel: #ffffff; --bg-card: #ffffff; 
            --text-main: #18181b; --text-muted: #71717a; --text-accent: #7c3aed; 
            --border: rgba(0,0,0,0.1); --btn-neutral: #f4f4f5; --btn-hover: #e4e4e7;
            --ev-found: #10b981; --ev-found-border: #059669;
            --ev-ruled: #ef4444; --ev-ruled-border: #dc2626;
            --beh-found: #0ea5e9; --beh-found-border: #0284c7;
            --spd-found: #f59e0b; --spd-found-border: #d97706;
            --discord-color: #5865F2;
        }

        * { box-sizing: border-box; }
        html { background: transparent !important; }
        body { 
            background-color: var(--bg-base); color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; 
            transition: background-color 0.3s ease; 
        }

        .drag-region { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag; }
        
        /* --- SIDEBAR --- */
        .sidebar { 
            width: 310px; min-width: 280px; max-width: 450px; 
            background-color: var(--bg-panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; 
            z-index: 10; box-shadow: 4px 0 24px rgba(0,0,0,0.2); overflow-x: hidden; overflow-y: auto; 
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-panel); z-index: 10; display: flex; flex-direction: column; gap: 12px; cursor: move; }
        .brand-container h1 { margin: 0; color: var(--text-accent); font-size: 1.15rem; text-transform: uppercase; font-weight: 800; line-height: 1.2;}
        .creator-tag { margin: 2px 0 0 0; font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .discord-link { color: var(--discord-color); text-decoration: none; font-weight: 800; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 4px;}
        .discord-link:hover { color: #7289da; filter: drop-shadow(0 0 6px rgba(88, 101, 242, 0.4)); }
        
        .top-controls { display: flex; justify-content: space-between; gap: 6px; }
        .control-btn { flex: 1; background: var(--btn-neutral); border: 1px solid var(--border); color: var(--text-main); padding: 6px 4px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.2s; text-align: center; }
        .control-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
        .sidebar-content { padding: 15px; }

        /* SETTINGS PANEL */
        .settings-panel { display: flex; flex-direction: column; gap: 10px; background: var(--bg-card); padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px;}
        .setting-row { display: flex; justify-content: space-between; align-items: center; }
        .setting-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .setting-select { background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); padding: 4px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; outline: none; cursor: pointer; max-width: 130px;}
        .toggle-btn { background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; min-width: 65px; text-align: center;}
        .toggle-btn.active { background: #880000; color: white; border-color: #ff4444; }
        
        /* NEW HOTKEY BTN STYLE */
        .hotkey-btn { transition: all 0.2s ease; background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; text-align: center; min-width: 65px; }
        .hotkey-btn.recording { background: var(--spd-found); border-color: var(--spd-found-border); color: white; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* SIDEBAR TOOLS */
        .tool-card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .tool-header { display: flex; justify-content: space-between; align-items: center; }
        .tool-title { font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin: 0; }
        .tool-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        
        .tool-btn { background: var(--btn-neutral); color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.75rem; transition: 0.15s ease; flex: 1;}
        .tool-btn:hover { background: var(--btn-hover); transform: scale(1.02); }
        .tap-btn { background: var(--spd-found); color: white; border-color: var(--spd-found-border); }
        .tap-btn:hover { filter: brightness(1.15); }
        .timer-btn-start { background: var(--ev-ruled); color: white; border-color: var(--ev-ruled-border); }
        
        .timer-display { font-size: 1.4rem; font-family: monospace; font-weight: 800; text-align: center; width: 100%;}
        .timer-milestones { display: flex; gap: 4px; width: 100%; justify-content: center;}
        .milestone { padding: 2px 6px; border-radius: 4px; background: rgba(128,128,128,0.1); border: 1px solid var(--border); font-size: 0.65rem; font-weight: 800; color: var(--text-muted); }
        .milestone.active { background: var(--ev-found); color: white; border-color: var(--ev-found-border); box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        .speed-display { font-size: 1.4rem; font-family: monospace; font-weight: 800; color: var(--spd-found); text-align: center; margin: 0; line-height: 1;}
        .speed-history { display: flex; gap: 4px; justify-content: center; min-height: 18px; margin-top: 4px; }
        .hist-pill { background: rgba(128,128,128,0.15); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; color: var(--text-muted); font-family: monospace; font-weight: 800;}

        .metro-select { width: 100%; max-width: none; background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); padding: 6px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; outline: none; }
        .metro-btn.playing { background: var(--btn-neutral); color: var(--text-main); border-color: var(--border); }
        .metro-btn.flash { background: #10b981 !important; color: white !important; box-shadow: 0 0 12px rgba(16, 185, 129, 0.8); border-color: #059669 !important; }

        @keyframes timerWarningFlash { 0% { background-color: var(--ev-ruled); color: white; } 100% { background-color: transparent; color: var(--text-main); } }
        .timer-warning-flash { animation: timerWarningFlash 0.8s; }

        /* FILTER BUTTONS */
        .filter-group { margin-bottom: 20px; }
        .filter-group h3 { margin: 0 0 10px 0; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 4px; font-weight: 800;}
        .btn-list { display: flex; flex-direction: column; gap: 5px; }
        .filter-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--btn-neutral); color: var(--text-main); border: 1px solid transparent; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.15s ease; }
        .filter-btn:hover { background: var(--btn-hover); border-color: var(--border); }
        .filter-btn.ev-btn[data-state="1"] { background: var(--ev-found); border-color: var(--ev-found-border); color: white; }
        .filter-btn.ev-btn[data-state="2"], .filter-btn.spd-btn[data-state="2"] { background: var(--ev-ruled); border-color: var(--ev-ruled-border); color: white; opacity: 0.7; text-decoration: line-through; }
        .filter-btn.spd-btn[data-state="1"] { background: var(--spd-found); border-color: var(--spd-found-border); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--bg-base); }
        .main-header { padding: 12px 25px; border-bottom: 1px solid var(--border); background-color: var(--bg-panel); display: flex; justify-content: space-between; align-items: center; z-index: 5; cursor: move; }
        .ghost-counter { font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin: 0; }
        .ghost-counter span { color: var(--text-accent); }
        
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .toggle-hide-btn { background: rgba(128,128,128,0.1); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.2s;}
        .toggle-hide-btn:hover { background: var(--btn-hover); }
        .toggle-hide-btn.active { background: var(--text-accent); color: white; border-color: #7c3aed; }
        
        /* CLOSE BUTTON ON TOP RIGHT */
        .close-x-btn {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; 
            padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 800; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center;
        }
        .close-x-btn:hover { background: #ef4444; color: white; border-color: #dc2626; transform: scale(1.05); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }

        /* GHOST GRID */
        .ghost-scroll { flex: 1; overflow-y: auto; padding: 25px; }
        .ghost-scroll::-webkit-scrollbar { width: 8px; }
        .ghost-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
        .ghost-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-width: 1600px; margin: 0 auto; align-items: stretch;}
        
        .ghost-card { background: linear-gradient(145deg, var(--bg-card) 0%, rgba(39, 39, 42, 0.3) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; position: relative; overflow: hidden;}
        .ghost-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, transparent); transition: 0.3s;}
        .ghost-card:hover { transform: translateY(-3px); border-color: var(--text-muted); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .ghost-card:hover::before { background: linear-gradient(90deg, var(--text-accent), var(--spd-found)); }
        
        .ghost-card.speed-highlight { border-color: var(--spd-found-border); box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); }
        .ghost-card.crossed-out { opacity: 0.25; filter: grayscale(100%); transform: none; box-shadow: none; border-color: transparent; }
        .ghost-card.crossed-out .card-title { text-decoration: line-through; color: var(--text-muted); }
        .ghost-card.crossed-out::before { display: none; }
        body.hide-crossed-mode .ghost-card.crossed-out { display: none !important; }

        .card-front { display: flex; flex-direction: column; gap: 8px; height: 100%;}
        .card-back { display: none; flex-direction: column; gap: 8px; height: 100%; }
        .ghost-card.show-guide .card-front { display: none; }
        .ghost-card.show-guide .card-back { display: flex; }

        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .card-title { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px;}
        .flip-btn { background: var(--btn-neutral); color: var(--text-main); border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.2s;}
        .flip-btn:hover { background: var(--text-accent); color: white; border-color: var(--text-accent); }

        .card-section { display: flex; flex-direction: column; gap: 4px; }
        .section-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; }
        .card-evidences { display: flex; flex-wrap: wrap; gap: 4px; }
        .ev-pill { background: rgba(0,0,0,0.2); border: 1px solid var(--border); font-size: 0.7rem; padding: 3px 6px; border-radius: 6px; color: var(--text-main); font-weight: 600; }
        
        .tells { font-size: 0.85rem; line-height: 1.4; color: var(--text-muted); font-weight: 400;}
        .tells b { color: var(--text-main); font-weight: 700; background: rgba(128,128,128,0.15); padding: 1px 4px; border-radius: 4px; }
        .speed-box { background: rgba(128,128,128,0.1); border: 1px solid var(--border); padding: 6px 10px; border-radius: 8px; color: var(--spd-found); font-weight: 800; font-size: 0.8rem; margin-top: auto; display: flex; align-items: center; gap: 6px; }

        .guide-title { font-size: 0.9rem; font-weight: 800; color: var(--beh-found); text-transform: uppercase; border-bottom: 1px dashed var(--border); padding-bottom: 6px; margin: 0 0 4px 0;}
        .guide-list { margin: 0; padding-left: 16px; font-size: 0.8rem; line-height: 1.4;}
        .guide-list li { margin-bottom: 4px; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header drag-region">
            <div class="brand-container">
                <h1>Phasmophobia Cheatsheet</h1>
                <p class="creator-tag">Created by <a href="https://discord.com/users/mrrobot191" class="discord-link no-drag" target="_blank">Mr. Robot</a></p>
            </div>
            <div class="top-controls no-drag">
                <button class="control-btn" onclick="toggleTheme()">🌙 Theme</button>
                <button class="control-btn" onclick="resetAll()">🔄 Reset</button>
            </div>
        </div>

        <div class="sidebar-content no-drag">

            <div class="settings-panel">
                <div class="setting-row">
                    <span class="setting-label">Toggle Hotkey</span>
                    <button class="hotkey-btn" id="hotkey-btn" title="Click to assign a new hotkey">Alt+X</button>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Custom Speed</span>
                    <select class="setting-select" id="custom-speed-multiplier" onchange="updateMultipliers()">
                        <option value="0.5">50%</option>
                        <option value="0.75">75%</option>
                        <option value="1.0" selected>100%</option>
                        <option value="1.25">125%</option>
                        <option value="1.5">150%</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Tap Accuracy</span>
                    <select class="setting-select" id="tap-tolerance" onchange="updateMultipliers()">
                        <option value="0.05">Strict (±0.05)</option>
                        <option value="0.15">Normal (±0.15)</option>
                        <option value="0.25" selected>Forgiving (±0.25)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Blood Moon</span>
                    <button class="toggle-btn" id="blood-moon-btn" onclick="toggleBloodMoon()">🌙 OFF</button>
                </div>
            </div>

            <div class="filter-group">
                <h3>Primary Evidence</h3>
                <div class="btn-list" id="evidence-container"></div>
            </div>
            
            <div class="filter-group">
                <h3>Speed Traits</h3>
                <div class="btn-list" id="speed-container"></div>
            </div>

            <div class="filter-group">
                <h3>Hunting Tools</h3>
                
                <div class="tool-card">
                    <div class="tool-header">
                        <h4 class="tool-title">Smudge Timer</h4>
                    </div>
                    <div class="timer-display" id="timer-display">00:00</div>
                    <div class="timer-milestones">
                        <div class="milestone" id="ms-60" title="Demon">60s</div>
                        <div class="milestone" id="ms-90" title="Normal">90s</div>
                        <div class="milestone" id="ms-120" title="Obambo">120s</div>
                        <div class="milestone" id="ms-180" title="Spirit">180s</div>
                    </div>
                    <div class="tool-row">
                        <button class="tool-btn timer-btn-start" onclick="startTimer()">Start</button>
                        <button class="tool-btn" onclick="stopTimer()">Reset</button>
                    </div>
                </div>

                <div class="tool-card">
                    <div class="tool-header">
                        <h4 class="tool-title">Speed Finder</h4>
                    </div>
                    <div class="speed-display" id="speed-display">-- m/s</div>
                    <div class="speed-history" id="speed-history"></div>
                    <div class="tool-row">
                        <button class="tool-btn tap-btn" id="tap-btn" onclick="handleTap()">👣 Tap</button>
                        <button class="tool-btn" onclick="resetTap()">Reset</button>
                    </div>
                </div>

                <div class="tool-card">
                    <div class="tool-header">
                        <h4 class="tool-title">Metronome</h4>
                    </div>
                    <select class="metro-select" id="metro-speed">
                        <option value="0.4">0.4 (Deo Close)</option>
                        <option value="1.0">1.0 (Rev Hide / Old Thaye)</option>
                        <option value="1.2">1.2 (Dayan Still)</option>
                        <option value="1.36">1.36 (Gallu Weak)</option>
                        <option value="1.4">1.4 (Warm Hantu)</option>
                        <option value="1.45">1.45 (Obambo Calm)</option>
                        <option value="1.5">1.5 (Moroi High San)</option>
                        <option value="1.53">1.53 (Slow Twin)</option>
                        <option value="1.7" selected>1.7 (Normal)</option>
                        <option value="1.87">1.87 (Fast Twin)</option>
                        <option value="1.96">1.96 (Obambo Aggr)</option>
                        <option value="2.25">2.25 (Dayan Walk/Moroi)</option>
                        <option value="2.5">2.5 (Jinn / Raiju)</option>
                        <option value="2.7">2.7 (Cold Hantu)</option>
                        <option value="2.75">2.75 (Young Thaye)</option>
                        <option value="3.0">3.0 (Rev LOS / Deo)</option>
                    </select>
                    <button class="tool-btn tap-btn metro-btn" id="metro-play" onclick="toggleMetronome()">▶ Play</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="main-header drag-region">
            <div class="ghost-counter no-drag" id="ghost-counter">👻 <span id="count-num">27</span> / 27</div>
            
            <div class="header-controls">
                <button class="toggle-hide-btn no-drag" id="hide-crossed-btn" onclick="toggleHideCrossed()">👁️ Hide Crossed</button>
                <button class="close-x-btn no-drag" onclick="closeApp()" title="Close Cheatsheet">✖</button>
            </div>
        </div>

        <div class="ghost-scroll no-drag">
            <div class="ghost-grid" id="ghost-grid"></div>
        </div>
    </main>

    <script>
        // --- ELECTRON IPC & CONTROLS ---
        // We only require IPC if running in Electron, preventing errors if opened in a standard Chrome tab
        const isElectron = typeof require !== 'undefined';
        const ipcRenderer = isElectron ? require('electron').ipcRenderer : null;

        function closeApp() {
            if (typeof window.close === 'function') {
                window.close();
            }
        }

        // --- HOTKEY CAPTURE LOGIC ---
        let isRecordingHotkey = false;
        const hotkeyBtn = document.getElementById('hotkey-btn');

        hotkeyBtn.addEventListener('click', () => {
            isRecordingHotkey = true;
            hotkeyBtn.innerText = "Listening...";
            hotkeyBtn.classList.add('recording');
        });

        document.addEventListener('keydown', (e) => {
            if (!isRecordingHotkey) return;
            e.preventDefault();

            // Ignore standalone modifiers. We wait for a final key.
            const modifiers = ['Control', 'Alt', 'Shift', 'Meta'];
            if (modifiers.includes(e.key)) return;

            let keys = [];
            // Electron uses "CommandOrControl" to handle Ctrl across OSs
            if (e.ctrlKey || e.metaKey) keys.push('CommandOrControl');
            if (e.altKey) keys.push('Alt');
            if (e.shiftKey) keys.push('Shift');

            let key = e.key.toUpperCase();
            if (key === ' ') key = 'Space';
            
            keys.push(key);
            const hotkeyString = keys.join('+');

            // Format it nicely for the UI (Users prefer to read 'Ctrl' instead of 'CommandOrControl')
            hotkeyBtn.innerText = hotkeyString.replace('CommandOrControl', 'Ctrl');
            hotkeyBtn.classList.remove('recording');
            isRecordingHotkey = false;

            // Transmit the new hotkey to the main process backend
            if (ipcRenderer) {
                ipcRenderer.send('update-hotkey', hotkeyString);
            }
        });


        // --- DATA ---
        const evidenceNames = ["EMF Level 5", "DOTS Projector", "Ultraviolet", "Ghost Orb", "Ghost Writing", "Spirit Box", "Freezing Temperatures"];
        const speedTraits = ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"];
        const KNOWN_SPEEDS = [0.4, 1.0, 1.2, 1.36, 1.4, 1.45, 1.5, 1.53, 1.7, 1.87, 1.96, 2.25, 2.5, 2.7, 2.75, 3.0];
        
        const ghosts = [
            { name: "Dayan", rawSpeeds: [1.2, 2.25], evidences: ["EMF Level 5", "Ghost Orb", "Spirit Box"], tells: "Speed/sanity depends on player movement within 10m. Crawls if you stand still; speeds up if you move. <b>Female models only.</b>", speed: "1.2 m/s (Still) / 2.25 (Walk)", guide: "Loop it around a small object (like kitchen island). It will speed up significantly when moving, but crawl to a halt if you stop." },
            { name: "Gallu", rawSpeeds: [1.36, 1.7, 1.96], evidences: ["EMF Level 5", "Spirit Box", "Ultraviolet"], tells: "Cycles Normal/Enraged/Weakened. Enrages via salt, smudge, or crucifix. <b>When enraged, ignores salt</b> (can only step in salt once before 2s delay).", speed: "1.36 ➔ 1.7 ➔ 1.96 m/s", guide: "Smudge it during a hunt to enrage it. Measure the speed; it should be blazing fast (1.96). If you place salt, it will speed right over the second pile." },
            { name: "Obambo", rawSpeeds: [1.45, 1.96], evidences: ["DOTS Projector", "Ghost Writing", "Ultraviolet"], tells: "Swaps Calm/Aggressive every 2 mins. Aggressive: 65% hunt, shorter hunts. <b>Can swap speeds mid-hunt.</b>", speed: "1.45 (Calm) / 1.96 (Aggr)", guide: "Use the Speed Tapper. If you record two vastly different speeds (1.45 and 1.96) across two different hunts, it's an Obambo." },
            { name: "Banshee", rawSpeeds: [1.7], evidences: ["DOTS Projector", "Ghost Orb", "Ultraviolet"], tells: "Targets ONE player. Walks right through non-targets during hunts. 33% chance to scream on Paramic. <b>Female models only.</b>", speed: "1.7 m/s (Normal)", guide: "Hold a Parabolic Microphone towards the ghost room. A unique wailing scream confirms Banshee. During multi-player hunts, stand in its way if you aren't target." },
            { name: "Demon", rawSpeeds: [1.7], evidences: ["Freezing Temperatures", "Ghost Writing", "Ultraviolet"], tells: "Relentless (70% threshold). Smudge only prevents hunts for 60s. Crucifix range is 5m (larger than normal).", speed: "1.7 m/s (Normal)", guide: "Use the Smudge Timer tool. Smudge the room, hit start. If it hunts BEFORE 90 seconds, it's 100% a Demon." },
            { name: "Deogen", rawSpeeds: [0.4, 3.0], evidences: ["DOTS Projector", "Ghost Writing", "Spirit Box"], tells: "Always knows your location. Extremely fast far away, drops to an agonizingly slow crawl when close. <b>Unique heavy breathing on Spirit Box.</b>", speed: "3.0 m/s (Far) ➔ 0.4 (Close)", guide: "Do NOT hide. Stand in an open area during a hunt. It will rocket toward you and slow to a snail's pace (0.4m/s) when within 3 meters." },
            { name: "Goryo", rawSpeeds: [1.7], evidences: ["DOTS Projector", "EMF Level 5", "Ultraviolet"], tells: "DOTS only seen through camera with no one in the room. Rarely wanders and <b>never changes favorite room.</b>", speed: "1.7 m/s (Normal)", guide: "Very hard on 0 evidence. Confirm by ruling out wanders. If it NEVER changes favorite rooms even on high difficulty, suspect Goryo." },
            { name: "Hantu", rawSpeeds: [1.4, 2.7], evidences: ["Freezing Temperatures", "Ghost Orb", "Ultraviolet"], tells: "Fast in cold rooms, slow in warm. Has <b>visible freezing breath</b> during a hunt if breaker is OFF. Never turns breaker on.", speed: "1.4 m/s (Warm) ➔ 2.7 (Cold)", guide: "Turn the breaker OFF. Hide and watch the ghost model as it hunts. If you see freezing breath coming from its head, it is a Hantu." },
            { name: "Jinn", rawSpeeds: [1.7, 2.5], evidences: ["EMF Level 5", "Freezing Temperatures", "Ultraviolet"], tells: "Charges fast with LOS <b>if breaker is ON</b>. Never turns breaker off. Can zap 25% sanity (EMF 2 at breaker).", speed: "2.5 m/s (Far) ➔ 1.7 (Close)", guide: "Turn breaker ON. Break LOS during a hunt, then peek. If it rockets towards you (2.5m/s) and instantly slows to 1.7m/s when it gets close, it's a Jinn." },
            { name: "Mare", rawSpeeds: [1.7], evidences: ["Ghost Orb", "Ghost Writing", "Spirit Box"], tells: "Hunts at 60% in dark, 40% in light. Frequently <b>turns lights off instantly</b>. Never turns them on.", speed: "1.7 m/s (Normal)", guide: "Turn lights ON near it. A Mare can never turn a light ON. If it instantly turns a light off the second you flip it on, highly likely Mare." },
            { name: "Moroi", rawSpeeds: [1.5, 2.25], evidences: ["Freezing Temperatures", "Ghost Writing", "Spirit Box"], tells: "Speed scales with sanity (lower sanity = faster). Blinds for 7.5s when smudged. <b>Curses you</b> via Spirit Box/Paramic.", speed: "1.5 m/s (High San) ➔ 2.25 (0 San)", guide: "Smudge it during a loop. Normal ghosts wander blindly for 6s. A Moroi is blinded for 7.5s. Match speed to sanity level." },
            { name: "Myling", rawSpeeds: [1.7], evidences: ["EMF Level 5", "Ghost Writing", "Ultraviolet"], tells: "Footsteps cannot be heard during hunt until within <b>12 meters</b> (normal is 20m). Flashlight flickers first.", speed: "1.7 m/s (Normal)", guide: "Hide during a hunt with a flashlight ON the floor. If the flashlight starts flickering BEFORE you hear the footsteps, it is a Myling." },
            { name: "Obake", rawSpeeds: [1.7], evidences: ["EMF Level 5", "Ghost Orb", "Ultraviolet"], tells: "<b>6.66% chance to shapeshift</b> model for a single blink during a hunt. UV leaves rare 6-fingered prints.", speed: "1.7 m/s (Normal)", guide: "Loop it around a large object. Watch it blink. If it temporarily shifts into a completely different ghost model for one blink, it's an Obake." },
            { name: "Oni", rawSpeeds: [1.7], evidences: ["DOTS Projector", "EMF Level 5", "Freezing Temperatures"], tells: "Highly visible during hunts. Drains 20% sanity on events. <b>Never does the airball mist event.</b>", speed: "1.7 m/s (Normal)", guide: "Watch it during a hunt. Normal ghosts blink invisible. An Oni stays highly visible and rarely blinks out. It also will NEVER do the mist 'hiss' event." },
            { name: "Onryo", rawSpeeds: [1.7], evidences: ["Freezing Temperatures", "Ghost Orb", "Spirit Box"], tells: "Firelights act as crucifixes. If it blows out <b>any 3 Firelights/Candles</b>, it triggers an immediate hunt. Cannot light fires.", speed: "1.7 m/s (Normal)", guide: "Place a candle. Let it blow it out 3 times. On the 3rd blowout, if it triggers a hunt regardless of your high sanity, it's an Onryo." },
            { name: "Phantom", rawSpeeds: [1.7], evidences: ["DOTS Projector", "Spirit Box", "Ultraviolet"], tells: "Blinks very slowly. <b>Disappears instantly</b> if photographed during an event.", speed: "1.7 m/s (Normal)", guide: "Take a photo of it during an event. If it instantly disappears but the event sound continues, it's a Phantom. Also stays invisible longer during hunts." },
            { name: "Poltergeist", rawSpeeds: [1.7], evidences: ["Ghost Writing", "Spirit Box", "Ultraviolet"], tells: "Throws an item every 0.5s during a hunt. Can do a <b>Polty Bomb</b> throwing multiple items at once (-2% sanity per item).", speed: "1.7 m/s (Normal)", guide: "Make a pile of items (shoes, cups, books). If the ghost touches the pile and causes a massive 'explosion' of items throwing everywhere, it's a Polty." },
            { name: "Raiju", rawSpeeds: [1.7, 2.5], evidences: ["DOTS Projector", "EMF Level 5", "Ghost Orb"], tells: "Accelerates near active electronics. Disrupts electronics from <b>15 meters away</b>.", speed: "1.7 m/s ➔ 2.5 (Near Tech)", guide: "Place an active flashlight/DOTS on the ground. Loop the ghost over it. It will rocket to 2.5m/s when near the item, and slow down away from it." },
            { name: "Revenant", rawSpeeds: [1.0, 3.0], evidences: ["Freezing Temperatures", "Ghost Orb", "Ghost Writing"], tells: "Crawls with no LOS. <b>Rockets toward you</b> the millisecond it gets LOS or detects electronics.", speed: "1.0 m/s (Hidden) ➔ 3.0 (LOS)", guide: "Hide well. Listen to the footsteps. They will be incredibly slow (1.0m/s). Step into its line of sight, and it will instantly rocket to 3.0m/s." },
            { name: "Shade", rawSpeeds: [1.7], evidences: ["EMF Level 5", "Freezing Temperatures", "Ghost Writing"], tells: "<b>Never hunts</b> if a player is in the same room. Waits until 35% sanity to hunt.", speed: "1.7 m/s (Normal)", guide: "Stand completely inside its favorite room at low sanity. A Shade is hard-coded to never initiate a hunt if you share a room with it." },
            { name: "Spirit", rawSpeeds: [1.7], evidences: ["EMF Level 5", "Ghost Writing", "Spirit Box"], tells: "Smudging prevents it from hunting for <b>exactly 180 seconds</b>. If it hunts before, rule it out.", speed: "1.7 m/s (Normal)", guide: "Smudge the ghost at 0% sanity. Start the Smudge Timer. If it initiates a hunt BEFORE the 180s milestone lights up, cross out Spirit." },
            { name: "Thaye", rawSpeeds: [1.0, 2.75], evidences: ["DOTS Projector", "Ghost Orb", "Ghost Writing"], tells: "Starts game blazing fast. <b>Ages over time</b> near players, permanently slowing. No LOS speedup.", speed: "2.75 m/s (Young) ➔ 1.0 (Old)", guide: "Stand in the ghost room early. First hunt it will be 2.75m/s. Wait 15 mins near it. Next hunt it will crawl at 1.0m/s. Does NOT speed up with LOS." },
            { name: "The Mimic", rawSpeeds: [], evidences: ["Freezing Temperatures", "Spirit Box", "Ultraviolet", "Ghost Orb"], tells: "Copies other ghosts. <b>Always shows Ghost Orbs</b>, even on 0 evidence runs. (Orbs are fake evidence).", speed: "Variable (Mimics others)", guide: "Even on a 0-Evidence custom difficulty, the Mimic will ALWAYS show Ghost Orbs on camera. If you see Orbs on a 0-ev run, you found it." },
            { name: "The Twins", rawSpeeds: [1.53, 1.87], evidences: ["EMF Level 5", "Freezing Temperatures", "Spirit Box"], tells: "Alternates fast/slow twin. Performs <b>Twinteractions</b> (items thrown in different rooms simultaneously).", speed: "1.53 m/s (Slow) / 1.87 (Fast)", guide: "Use the Speed Tapper. If one hunt feels slow (1.53) and the next hunt feels fast (1.87), it's the Twins. Look for items thrown simultaneously." },
            { name: "Wraith", rawSpeeds: [1.7], evidences: ["DOTS Projector", "EMF Level 5", "Spirit Box"], tells: "<b>Never steps in salt.</b> Can randomly teleport to a player outside a hunt, leaving an EMF 2.", speed: "1.7 m/s (Normal)", guide: "Cover the ghost room door with Salt. If the ghost does events or hunts outside the room but the salt remains completely untouched, it's a Wraith." },
            { name: "Yokai", rawSpeeds: [1.7], evidences: ["DOTS Projector", "Ghost Orb", "Spirit Box"], tells: "Hunts at 80% if talking. <b>Deaf and blind</b> beyond 2.5 meters during a hunt.", speed: "1.7 m/s (Normal)", guide: "During a hunt, hide behind a counter and shout on your microphone. A Yokai is deaf beyond 2.5 meters and will not path toward your voice." },
            { name: "Yurei", rawSpeeds: [1.7], evidences: ["DOTS Projector", "Freezing Temperatures", "Ghost Orb"], tells: "The only ghost that can <b>fully slam the front door shut</b> outside of a hunt (drains 15% sanity).", speed: "1.7 m/s (Normal)", guide: "Stay near the front exit. If the front door fully slams shut and locks WITHOUT a hunt or event triggering, it is a Yurei." }
        ];

        ghosts.forEach(g => { g.speeds = []; }); 
        const addSpeed = (name, spdArray) => { let g = ghosts.find(x => x.name === name); if(g) g.speeds.push(...spdArray); };
        addSpeed("Dayan", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("Gallu", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("Obambo", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("Deogen", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("Hantu", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("Jinn", ["Fast Ghost (>1.7 m/s)"]);
        addSpeed("Moroi", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]); 
        addSpeed("Raiju", ["Fast Ghost (>1.7 m/s)"]);
        addSpeed("Revenant", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("Thaye", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("The Twins", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]);
        addSpeed("The Mimic", ["Fast Ghost (>1.7 m/s)", "Slow Ghost (<1.7 m/s)"]); 

        let evStates = {}; evidenceNames.forEach(e => evStates[e] = 0);
        let spdStates = {}; speedTraits.forEach(s => spdStates[s] = 0);
        let hideCrossedMode = false;
        let currentCalculatedSpeed = null;
        let isBloodMoon = false;
        let customSpeedMult = 1.0;

        function getIcon(state) { return state === 1 ? '✅' : (state === 2 ? '❌' : '➖'); }

        function toggleBloodMoon() {
            isBloodMoon = !isBloodMoon;
            const btn = document.getElementById('blood-moon-btn');
            btn.classList.toggle('active', isBloodMoon);
            btn.innerText = isBloodMoon ? "🩸 ON" : "🌙 OFF";
            updateMultipliers();
        }

        function updateMultipliers() {
            customSpeedMult = parseFloat(document.getElementById('custom-speed-multiplier').value);
            if (currentCalculatedSpeed !== null) render(); 
        }

        let audioCtx;
        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playWarningBeep() {
            initAudio();
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1); 
            osc.type = "square";
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.3);
        }

        function triggerWarning(id) {
            document.getElementById(id).classList.add('active');
            playWarningBeep();
            const td = document.getElementById('timer-display');
            td.classList.remove('timer-warning-flash'); void td.offsetWidth; td.classList.add('timer-warning-flash');
        }

        const tapTimes = [], savedSpeeds = [];
        let tapTimeout;
        function handleTap() {
            const now = Date.now(); tapTimes.push(now);
            if (tapTimes.length > 12) tapTimes.shift(); 
            if (tapTimes.length > 1) {
                let totalDelta = 0;
                for (let i = 1; i < tapTimes.length; i++) totalDelta += (tapTimes[i] - tapTimes[i-1]);
                let calculatedSpeed = (1000 / (totalDelta / (tapTimes.length - 1))) * 0.85;
                
                let bloodMoonMult = isBloodMoon ? 1.15 : 1.0;
                let totalMultiplier = customSpeedMult * bloodMoonMult;
                let adjustedSpeeds = KNOWN_SPEEDS.map(s => s * totalMultiplier);
                
                let snappedSpeed = adjustedSpeeds.reduce((prev, curr) => Math.abs(curr - calculatedSpeed) < Math.abs(prev - calculatedSpeed) ? curr : prev);
                
                document.getElementById('speed-display').innerText = snappedSpeed.toFixed(2) + " m/s";
                currentCalculatedSpeed = snappedSpeed;
                render(); 
            }
            clearTimeout(tapTimeout);
            tapTimeout = setTimeout(() => {
                if (currentCalculatedSpeed !== null) {
                    savedSpeeds.unshift(currentCalculatedSpeed.toFixed(2));
                    if (savedSpeeds.length > 3) savedSpeeds.pop();
                    document.getElementById('speed-history').innerHTML = savedSpeeds.map(s => `<span class="hist-pill">${s}</span>`).join('');
                }
                tapTimes.length = 0;
            }, 3500);
        }

        function resetTap() {
            tapTimes.length = 0; savedSpeeds.length = 0; currentCalculatedSpeed = null;
            document.getElementById('speed-display').innerText = "-- m/s";
            document.getElementById('speed-history').innerHTML = ""; render();
        }

        let metroInterval, isMetroPlaying = false;
        function playClick() {
            initAudio();
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = "triangle"; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
            const btn = document.getElementById('metro-play');
            btn.classList.add('flash'); setTimeout(() => btn.classList.remove('flash'), 100); 
        }

        function toggleMetronome() {
            const btn = document.getElementById('metro-play');
            if (isMetroPlaying) {
                clearInterval(metroInterval); isMetroPlaying = false; btn.innerHTML = "▶ Play"; btn.classList.remove('playing');
            } else {
                initAudio(); 
                let baseSpeed = parseFloat(document.getElementById('metro-speed').value);
                let actualSpeed = baseSpeed * (customSpeedMult * (isBloodMoon ? 1.15 : 1.0));
                isMetroPlaying = true; btn.innerHTML = "⏹ Stop"; btn.classList.add('playing');
                playClick(); metroInterval = setInterval(playClick, 500 * (1.7 / actualSpeed));
            }
        }

        let smudgeInterval, smudgeSeconds = 0;
        function startTimer() {
            clearInterval(smudgeInterval); smudgeSeconds = 0; updateTimerDisplay();
            document.querySelectorAll('.milestone').forEach(el => el.classList.remove('active'));
            smudgeInterval = setInterval(() => {
                smudgeSeconds++; updateTimerDisplay();
                if (smudgeSeconds === 60) triggerWarning('ms-60');
                if (smudgeSeconds === 90) triggerWarning('ms-90');
                if (smudgeSeconds === 120) triggerWarning('ms-120');
                if (smudgeSeconds === 180) triggerWarning('ms-180');
            }, 1000);
        }
        function stopTimer() { clearInterval(smudgeInterval); smudgeSeconds = 0; updateTimerDisplay(); document.querySelectorAll('.milestone').forEach(el => el.classList.remove('active')); }
        function updateTimerDisplay() { let m = Math.floor(smudgeSeconds / 60), s = smudgeSeconds % 60; document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`; }

        function toggleFlip(ghostName, event) { event.stopPropagation(); const card = document.getElementById('ghost-' + ghostName.replace(/\s+/g, '-')); if (card) card.classList.toggle('show-guide'); }

        function init() {
            const createBtn = (cId, arr, stObj, tc, pfx) => {
                const c = document.getElementById(cId);
                arr.forEach(i => {
                    const b = document.createElement('button'); b.className = `filter-btn ${tc} no-drag`; b.id = `${pfx}-${i.replace(/[^a-zA-Z0-9<>]/g, '')}`;
                    b.innerHTML = `<span>${i}</span> <span class="icon-placeholder" id="icon-${b.id}">➖</span>`;
                    b.setAttribute('data-state', '0'); b.onclick = () => toggleState(i, stObj, b.id); c.appendChild(b);
                });
            };
            createBtn('evidence-container', evidenceNames, evStates, 'ev-btn', 'ev');
            createBtn('speed-container', speedTraits, spdStates, 'spd-btn', 'spd');

            const grid = document.getElementById('ghost-grid');
            ghosts.forEach(g => {
                const card = document.createElement('div'); card.className = 'ghost-card'; card.id = 'ghost-' + g.name.replace(/\s+/g, '-');
                card.onclick = () => { card.classList.toggle('crossed-out'); updateCounter(); };
                card.innerHTML = `
                    <div class="card-front">
                        <div class="card-header"><h3 class="card-title">${g.name}</h3><button class="flip-btn no-drag" onclick="toggleFlip('${g.name}', event)">❔ Guide</button></div>
                        <div class="card-section"><span class="section-label">Evidence</span><div class="card-evidences">${g.evidences.map(e => `<span class="ev-pill">${e}</span>`).join('')}</div></div>
                        <div class="card-section"><span class="section-label">Behavior & Tells</span><div class="tells">${g.tells}</div></div>
                        <div class="speed-box">🏃 ${g.speed}</div>
                    </div>
                    <div class="card-back">
                        <div class="card-header"><h3 class="card-title">${g.name}</h3><button class="flip-btn no-drag" onclick="toggleFlip('${g.name}', event)">🔙 Back</button></div>
                        <h4 class="guide-title">0-Evidence Survival Guide</h4>
                        <ul class="guide-list"><li>${g.guide}</li></ul>
                    </div>`;
                grid.appendChild(card);
            });
            updateCounter();
        }

        function toggleState(i, stObj, id) {
            stObj[i] = (stObj[i] + 1) % 3; document.getElementById(id).setAttribute('data-state', stObj[i]); document.getElementById(`icon-${id}`).innerText = getIcon(stObj[i]); render();
        }

        function toggleHideCrossed() {
            hideCrossedMode = !hideCrossedMode; document.body.classList.toggle('hide-crossed-mode', hideCrossedMode);
            const btn = document.getElementById('hide-crossed-btn'); btn.classList.toggle('active', hideCrossedMode); btn.innerHTML = hideCrossedMode ? '🙈 Show Crossed' : '👁️ Hide Crossed';
        }

        function resetAll() {
            const rObj = (stObj, pfx) => Object.keys(stObj).forEach(k => { stObj[k] = 0; let id = `${pfx}-${k.replace(/[^a-zA-Z0-9<>]/g, '')}`; document.getElementById(id).setAttribute('data-state', '0'); document.getElementById(`icon-${id}`).innerText = '➖'; });
            rObj(evStates, 'ev'); rObj(spdStates, 'spd'); 
            document.querySelectorAll('.ghost-card.crossed-out').forEach(c => c.classList.remove('crossed-out'));
            document.querySelectorAll('.ghost-card.show-guide').forEach(c => c.classList.remove('show-guide'));
            resetTap(); render();
        }

        function render() {
            ghosts.forEach(g => {
                let isValid = true;
                for (let ev of evidenceNames) { if ((evStates[ev] === 1 && !g.evidences.includes(ev)) || (evStates[ev] === 2 && g.evidences.includes(ev))) isValid = false; }
                for (let spd of speedTraits) { if ((spdStates[spd] === 1 && !g.speeds.includes(spd)) || (spdStates[spd] === 2 && g.speeds.includes(spd))) isValid = false; }
                if (currentCalculatedSpeed !== null) {
                    let tol = parseFloat(document.getElementById('tap-tolerance').value), tm = customSpeedMult * (isBloodMoon ? 1.15 : 1.0);
                    if (!(g.name === "The Mimic" || g.rawSpeeds.some(bs => Math.abs((bs * tm) - currentCalculatedSpeed) <= tol))) isValid = false;
                }
                document.getElementById('ghost-' + g.name.replace(/\s+/g, '-')).style.display = isValid ? 'flex' : 'none';
            });
            updateCounter();
        }

        function updateCounter() { document.getElementById('count-num').innerText = Array.from(document.querySelectorAll('.ghost-card')).filter(c => c.style.display !== 'none' && !c.classList.contains('crossed-out')).length; }
        function toggleTheme() { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        window.onload = init;
    </script>
