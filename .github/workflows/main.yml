name: Build Phasmo Single EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Get Repository Files
      uses: actions/checkout@v4

    - name: Setup Node.js (Cloud)
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Build the Single EXE
      run: npx electron-builder --win portable

    - name: Upload EXE for Download
      uses: actions/upload-artifact@v4
      with:
        name: PhasmoOverlay-Standalone
        path: dist/*.exe
